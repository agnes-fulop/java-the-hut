spring.profiles.active=dev

spring.datasource.url=jdbc:h2:mem:weatherdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

app.jwt.secret=${APP_JWT_SECRET:please-set-APP_JWT_SECRET-to-a-256-bit-value}
app.jwt.expiration-ms=86400000

app.security.users.admin.username=${APP_SECURITY_USERS_ADMIN_USERNAME:admin}
app.security.users.admin.password=${APP_SECURITY_USERS_ADMIN_PASSWORD:changeme}
app.security.users.weatherman.username=${APP_SECURITY_USERS_WEATHERMAN_USERNAME:weatherman}
app.security.users.weatherman.password=${APP_SECURITY_USERS_WEATHERMAN_PASSWORD:changeme}
